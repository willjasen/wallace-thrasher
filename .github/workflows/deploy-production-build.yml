# In your repository's `.github/workflows/deploy-production-build.yml` file.
---
# Name of your GitHub Actions workflow.
name: Deploy a Production Build

# Specifies to run this workflow whenever code is pushed to main branch, or when manually triggered
on:
  push:
    branches:
      - 'main'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Version tag to deploy'
        required: true

# Define environment variables for reuse
env:
  VERSION_TAG: ${{ github.event.inputs.tag || 'v1.8.0' }}
  SUCCESS_COLOR: "\033[0;32m"
  FAILURE_COLOR: "\033[0;31m"
  WARNING_COLOR: "\033[0;33m"
  INFO_COLOR: "\033[0;34m"
  DEBUG_COLOR: "\033[0;35m"
  RESET_COLOR: "\033[0m"

# Job definitions
jobs:
  build-and-publish:
    runs-on: ubuntu-latest

    steps:
      # Checkout the specific version tag when triggered by push to main
      # or use the specified tag when manually triggered
      - name: Checkout specific tag
        uses: actions/checkout@v4
        with:
          ref: ${{ env.VERSION_TAG }}

      # Set up Ruby for Jekyll.
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: 3.3

      # Install Jekyll and Bundler.
      - name: Install dependencies
        run: |
          cd jekyll
          gem install bundler
          bundle install

      # Build the Jekyll site with the baseurl set to ''
      - name: Build site for production
        run: |
          echo "Building site for production with version: ${{ env.VERSION_TAG }}"
          cd jekyll
          JEKYLL_ENV=production bundle exec jekyll build --baseurl ""

      # Deploy the rendered build to the `production-build` branch
      - name: Deploy to 'production-build' branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GH_PAGES_TOKEN }}
          publish_dir: ./jekyll/_site
          publish_branch: production-build
          keep_files: false

      # Send a webhook upon completion
      - name: Send webhook notification
        run: |
          curl -X POST -H "Content-Type: application/json" -d '{"content": "Published ${{ env.VERSION_TAG }} to the 'production-build' branch successfully!"}' ${{ secrets.WEBHOOK_URL }}

  # Deploy to IPFS
  #  - deploys to Storacha and Filebase
  #  - updates DNSLink TXT record in Cloudflare
  deploy-to-ipfs:
    needs: build-and-publish
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
            ref: production-build

      # ipfs/ipfs-deploy-action@v1 (v1.8.0) installs @storacha/cli without a pinned version.
      # v2.1.x introduced a regression where space/index/add fails with "Unexpected end of data".
      # Work around by replicating the action's steps with a pinned @storacha/cli version.
      - name: Setup Kubo CLI
        uses: ipfs/download-ipfs-distribution-action@v1
        with:
          name: kubo
          version: v0.33.0

      - name: ipfs init
        shell: bash
        run: ipfs init

      - name: Merkleize into CAR file
        id: deploy
        shell: bash
        run: |
          CID=$(ipfs add --cid-version 1 --chunker size-1048576 -Q -r .)
          ipfs dag export $CID > build.car
          echo "cid=$CID" >> "$GITHUB_OUTPUT"
          echo "Root CID: $CID"

      - name: Upload to Storacha
        shell: bash
        env:
          STORACHA_PRINCIPAL: ${{ secrets.STORACHA_KEY }}
        run: |
          npm install -g @storacha/cli@2.0.8
          storacha space add ${{ secrets.STORACHA_PROOF }}
          storacha up --car build.car

      - name: Upload to Filebase
        shell: bash
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.FILEBASE_ACCESS_KEY }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.FILEBASE_SECRET_KEY }}
        run: |
          aws --endpoint https://s3.filebase.com s3 cp build.car s3://wallace-thrasher --metadata 'import=car'

      - name: Update DNSLink in Cloudflare
        id: update-dnslink
        run: |
          curl -X PUT "https://api.cloudflare.com/client/v4/zones/${{ secrets.CLOUDFLARE_ZONE_ID }}/dns_records/${{ secrets.CLOUDFLARE_DNS_RECORD_ID }}" \
            -H "Authorization: Bearer ${{ secrets.CLOUDFLARE_API_TOKEN }}" \
            -H "Content-Type: application/json" \
            --data '{
              "type": "TXT",
              "name": "_dnslink.${{ secrets.CLOUDFLARE_DOMAIN }}",
              "content": "\"dnslink=/ipfs/${{ steps.deploy.outputs.cid }}\"",
              "ttl": 1
            }'

# END OF WORKFLOW