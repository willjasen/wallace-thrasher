---
layout: page
hide_from_nav: true
---

<div id="track-content">
  <p style="text-align: center;"><em>Loading track data...</em></p>
</div>

<style>
  .album-info {
    display: flex;
    align-items: center;
  }
  .image-container {
    margin-right: 20px;
  }
  .tooltip {
    position: relative;
    display: inline-block;
    cursor: pointer;
  }
  .tooltip .tooltiptext {
    visibility: hidden;
    opacity: 0;
    width: 200px;
    background-color: lavender;
    color: #000;
    text-align: center;
    border-radius: 4px;
    padding: 8px;
    position: absolute;
    z-index: 1;
    bottom: 125%;
    left: 50%;
    transform: translateX(-50%);
    transition: opacity 0.3s;
    border: 1px solid #ffdd57;
    box-shadow: 0 0 10px rgba(255, 221, 87, 0.5);
  }
  .tooltip:hover .tooltiptext {
    visibility: visible;
    opacity: 1;
  }
</style>

<script>
(async function () {
  const BASE_URL = '{{ site.baseurl }}';
  const JEKYLL_ENV = '{{ jekyll.environment }}';
  const BUILD_TIMESTAMP = '{{ site.time | date: "%s" }}';

  const params = new URLSearchParams(window.location.search);
  const albumSlug = params.get('album');
  const trackSlug = params.get('track');
  const container = document.getElementById('track-content');

  if (!albumSlug || !trackSlug) {
    container.innerHTML = '<p style="text-align: center;">No track specified. <a href="' + BASE_URL + '/albums/">Browse albums</a></p>';
    return;
  }

  async function fetchCached(path) {
    if (!('caches' in window)) {
      return fetch(path).then(r => r.json());
    }
    const cacheName = 'wallace-thrasher-' + BUILD_TIMESTAMP;
    const cache = await caches.open(cacheName);
    const cached = await cache.match(path);
    if (cached) { return cached.json(); }
    const response = await fetch(path);
    const data = await response.json();
    await cache.put(path, new Response(JSON.stringify(data), { headers: { 'Content-Type': 'application/json' } }));
    const keys = await caches.keys();
    for (const key of keys) {
      if (key !== cacheName && key.startsWith('wallace-thrasher-')) {
        await caches.delete(key);
      }
    }
    return data;
  }

  let data;
  try {
    data = await fetchCached(BASE_URL + '/assets/json/data.combined.json');
  } catch (e) {
    console.error('Error loading track data:', e);
    container.innerHTML = '<p style="text-align: center;">Error loading track data.</p>';
    return;
  }

  const album = (data.Albums || []).find(a => a.Album_Slug === albumSlug);
  if (!album) {
    container.innerHTML = '<p style="text-align: center;">Album not found: ' + albumSlug + '</p>';
    return;
  }

  const track = (album.Tracks || []).find(t => t.Track_Slug === trackSlug);
  if (!track) {
    container.innerHTML = '<p style="text-align: center;">Track not found: ' + trackSlug + '</p>';
    return;
  }

  document.title = track.Track_Title + ' \u2014 ' + album.Album;

  const needsReview = (track.Speakers_Adjusted !== true) || (track.Subtitles_Adjusted !== true);

  // Helper: create element with optional attributes and text content
  function el(tag, attrs) {
    const e = document.createElement(tag);
    Object.entries(attrs || {}).forEach(([k, v]) => e.setAttribute(k, v));
    return e;
  }
  function textEl(tag, attrs, content) {
    const e = el(tag, attrs);
    e.textContent = content;
    return e;
  }
  function hr(style) {
    const e = document.createElement('hr');
    e.style.margin = style || '20px 0';
    return e;
  }

  const frag = document.createDocumentFragment();

  // ---- Album header ----
  const albumInfo = el('div', { class: 'album-info', style: 'display: flex; align-items: center;' });
  albumInfo.appendChild(textEl('h2', { style: 'margin-bottom: 10px;' }, album.Album + ' (' + album.Year + ')'));
  const imgContainer = el('div', { class: 'image-container', style: 'margin-left: 50px;' });
  imgContainer.appendChild(el('img', { src: BASE_URL + '/assets/img/albums/' + album.Album_Picture, alt: album.Album, width: '150', height: '150' }));
  albumInfo.appendChild(imgContainer);
  frag.appendChild(albumInfo);

  // ---- Track title and number ----
  frag.appendChild(textEl('h3', { style: 'text-align: center; margin-top: 20px; margin-bottom: 0px;' },
    'Track ' + track.Track_Number + ': ' + track.Track_Title));

  // ---- Runtime ----
  if (track.Track_Length) {
    frag.appendChild(textEl('h4', { style: 'text-align: center; margin-top: 0px; margin-bottom: 0px;' },
      'Runtime: ' + track.Track_Length + ' seconds'));
  }

  // ---- Review status ----
  const reviewP = el('p', { style: 'text-align: center;' });
  if (needsReview) {
    reviewP.style.color = 'yellow';
    reviewP.innerHTML = 'This track needs reviewing! <a href="https://github.com/willjasen/wallace-thrasher/blob/main/CONTRIBUTING.md">--&gt; Lend a hand &lt;--</a>';
  } else {
    reviewP.style.color = 'green';
    reviewP.textContent = 'This track has been reviewed! \uD83D\uDE0A';
  }
  frag.appendChild(reviewP);

  // ---- Dev-environment metadata (non-production only) ----
  if (JEKYLL_ENV !== 'production') {
    frag.appendChild(hr());
    if (track.Last_Modified) {
      const d = new Date(track.Last_Modified * 1000);
      const iso = d.toISOString().replace(/\.\d{3}Z$/, '').replace('T', 'T');
      frag.appendChild(textEl('h5', { style: 'text-align: center; margin-top: -10px; margin-bottom: 30px;' }, 'Last modified: ' + iso));
    }
    if (track.Whisper_Model) {
      frag.appendChild(textEl('h5', { style: 'text-align: center; margin-top: -30px; margin-bottom: 30px;' }, 'Model used: ' + track.Whisper_Model));
    }
    frag.appendChild(textEl('h5', { style: 'text-align: center; margin-top: -30px; margin-bottom: 30px;' },
      'Speakers adjusted? ' + (track.Speakers_Adjusted !== undefined ? track.Speakers_Adjusted : false)));
    frag.appendChild(textEl('h5', { style: 'text-align: center; margin-top: -30px; margin-bottom: 30px;' },
      'Subtitles adjusted? ' + (track.Subtitles_Adjusted !== undefined ? track.Subtitles_Adjusted : false)));
    if (track.To_Do) {
      frag.appendChild(textEl('h5', { style: 'text-align: center; margin-top: -30px; margin-bottom: 40px;' }, 'To-Do: ' + track.To_Do));
    }
  }

  frag.appendChild(hr());

  // ---- Aliases / Establishments / Deliveries ----
  if (track.Aliases && track.Aliases.length > 0) {
    frag.appendChild(textEl('h5', { style: 'text-align: center; margin-top: 0px; margin-bottom: 0px;' },
      'Aliases: ' + track.Aliases.join(', ')));
  }
  if (track.Establishments && track.Establishments.length > 0) {
    frag.appendChild(textEl('h5', { style: 'text-align: center; margin-top: 0px; margin-bottom: 0px;' },
      'Establishments: ' + track.Establishments.join(', ')));
  }
  if (track.Deliveries && track.Deliveries.length > 0) {
    frag.appendChild(textEl('h5', { style: 'text-align: center; margin-top: 0px; margin-bottom: 0px;' },
      'Deliveries: ' + track.Deliveries.join(', ')));
  }

  // ---- Audio player (delegates to persistent-player.js) ----
  // Container in the page for a "Play this track" button when audio is already playing
  const audioContainer = el('div', { style: 'text-align: center; margin: 10px 0;' });
  frag.appendChild(audioContainer);

  function applyTrackAudio(matchingUrl) {
    const audio = window.lpcPlayer.audio;
    if (!audio.paused) {
      // Something is actively playing — don't interrupt; offer a button to switch
      audioContainer.innerHTML = '';
      const btn = document.createElement('button');
      btn.textContent = '\u25B6 Play this track';
      btn.style.cssText = 'color: greenyellow; background: none; border: 1px solid greenyellow; border-radius: 6px; padding: 6px 14px; cursor: pointer; font-weight: bold; font-size: 1em;';
      btn.addEventListener('click', function () {
        audio.src = matchingUrl;
        audio.style.display = '';
        audio.play();
        btn.remove();
      });
      audioContainer.appendChild(btn);
    } else {
      // Nothing playing — auto-load this track
      audio.src = matchingUrl;
      audio.style.display = '';
    }
  }

  function initTrackAudio() {
    const usbFilename = track.USB_Filename || (track.Track_Title + '.mp3');
    const albumUsbDir = album.USB_Directory;
    const relevantUrl = 'LPC USB/' + albumUsbDir + '/' + usbFilename;

    if (window.lpcPlayer && window.lpcPlayer.isLoaded()) {
      const matchingUrl = window.fileMap[relevantUrl];
      if (matchingUrl) {
        applyTrackAudio(matchingUrl);
        window.lpcPlayer.setNowPlaying(album.Album, track.Track_Title);
      }
    }
    // Load when directory is selected/granted for the first time
    document.addEventListener('lpc-loaded', function () {
      const matchingUrl = window.fileMap[relevantUrl];
      if (matchingUrl) {
        applyTrackAudio(matchingUrl);
        window.lpcPlayer.setNowPlaying(album.Album, track.Track_Title);
      }
    }, { once: true });
    document.addEventListener('lpc-permission-granted', async function () {
      const ok = await window.lpcPlayer.loadTrack(albumUsbDir, usbFilename);
      if (ok) window.lpcPlayer.setNowPlaying(album.Album, track.Track_Title);
    }, { once: true });
  }
  initTrackAudio();

  // ---- Subtitles ----
  frag.appendChild(hr());

  const subtitlesList = el('ul', { style: 'list-style-type: none;' });
  const subtitles = track.Subtitles || [];
  subtitles.forEach(function (sub) {
    const li = document.createElement('li');
    if (JEKYLL_ENV !== 'production') {
      const idxEl = document.createElement('i');
      idxEl.textContent = sub.Index;
      li.appendChild(idxEl);
      li.appendChild(document.createTextNode(' -- '));
    }
    const strong = document.createElement('strong');
    strong.textContent = sub.Speaker + ':';
    li.appendChild(strong);
    li.appendChild(document.createTextNode(' ' + sub.Text));
    li.appendChild(document.createElement('br'));
    subtitlesList.appendChild(li);
  });
  frag.appendChild(subtitlesList);

  // Replace loading indicator with rendered content
  container.innerHTML = '';
  container.appendChild(frag);

  // ---- Apple Music FAB ----
  // Clean up any FAB left from a previous track navigation
  ['appleMusicFab', 'appleMusicFabPanel'].forEach(function (id) {
    var existing = document.getElementById(id);
    if (existing) existing.remove();
  });

  if (track.Apple_Music_Link) {
    if (!document.getElementById('appleMusicFabStyle')) {
      var amStyle = document.createElement('style');
      amStyle.id = 'appleMusicFabStyle';
      amStyle.textContent = [
        '#appleMusicFab {',
        '  position: fixed; bottom: 24px; left: 24px; z-index: 9000;',
        '  height: 60px; min-width: 60px; border-radius: 30px;',
        '  background: #fc3c44; border: 2px solid #ff6b6b;',
        '  cursor: pointer; display: flex; flex-direction: row; align-items: center;',
        '  justify-content: center; gap: 8px; padding: 0 18px;',
        '  font-size: 28px; box-shadow: 0 4px 14px rgba(0,0,0,0.5);',
        '  transition: background 0.2s, box-shadow 0.2s; line-height: 1;',
        '}',
        '#appleMusicFab:hover { background: #ff5a5a; box-shadow: 0 6px 18px rgba(0,0,0,0.6); }',
        '#appleMusicFabPanel {',
        '  position: fixed; bottom: 102px; left: 24px; z-index: 8999;',
        '  background: #1e1e3a; border: 1px solid #ff6b6b;',
        '  border-radius: 14px; padding: 16px 18px;',
        '  box-shadow: 0 8px 28px rgba(0,0,0,0.6);',
        '  display: none; flex-direction: column; align-items: center;',
        '  min-width: 320px; gap: 10px;',
        '}'
      ].join('\n');
      document.head.appendChild(amStyle);
    }

    var amFab = document.createElement('button');
    amFab.id = 'appleMusicFab';
    amFab.title = 'Listen on Apple Music';
    amFab.setAttribute('aria-label', 'Listen on Apple Music');
    amFab.innerHTML = '<svg role="img" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" width="28" height="28" fill="white"><title>Apple Music</title><path d="M23.994 6.124a9.23 9.23 0 00-.24-2.19c-.317-1.31-1.062-2.31-2.18-3.043a5.022 5.022 0 00-1.877-.726 10.496 10.496 0 00-1.564-.15c-.04-.003-.083-.01-.124-.013H5.986c-.152.01-.303.017-.455.026-.747.043-1.49.123-2.193.4-1.336.53-2.3 1.452-2.865 2.78-.192.448-.292.925-.363 1.408-.056.392-.088.785-.1 1.18 0 .032-.007.062-.01.093v12.223c.01.14.017.283.027.424.05.815.154 1.624.497 2.373.65 1.42 1.738 2.353 3.234 2.801.42.127.856.187 1.293.228.555.053 1.11.06 1.667.06h11.03a12.5 12.5 0 001.57-.1c.822-.106 1.596-.35 2.295-.81a5.046 5.046 0 001.88-2.207c.186-.42.293-.87.37-1.324.113-.675.138-1.358.137-2.04-.002-3.8 0-7.595-.003-11.393zm-6.423 3.99v5.712c0 .417-.058.827-.244 1.206-.29.59-.76.962-1.388 1.14-.35.1-.706.157-1.07.173-.95.045-1.773-.6-1.943-1.536a1.88 1.88 0 011.038-2.022c.323-.16.67-.25 1.018-.324.378-.082.758-.153 1.134-.24.274-.063.457-.23.51-.516a.904.904 0 00.02-.193c0-1.815 0-3.63-.002-5.443a.725.725 0 00-.026-.185c-.04-.15-.15-.243-.304-.234-.16.01-.318.035-.475.066-.76.15-1.52.303-2.28.456l-2.325.47-1.374.278c-.016.003-.032.01-.048.013-.277.077-.377.203-.39.49-.002.042 0 .086 0 .13-.002 2.602 0 5.204-.003 7.805 0 .42-.047.836-.215 1.227-.278.64-.77 1.04-1.434 1.233-.35.1-.71.16-1.075.172-.96.036-1.755-.6-1.92-1.544-.14-.812.23-1.685 1.154-2.075.357-.15.73-.232 1.108-.31.287-.06.575-.116.86-.177.383-.083.583-.323.6-.714v-.15c0-2.96 0-5.922.002-8.882 0-.123.013-.25.042-.37.07-.285.273-.448.546-.518.255-.066.515-.112.774-.165.733-.15 1.466-.296 2.2-.444l2.27-.46c.67-.134 1.34-.27 2.01-.403.22-.043.442-.088.663-.106.31-.025.523.17.554.482.008.073.012.148.012.223.002 1.91.002 3.822 0 5.732z"/></svg>';

    var amPanel = document.createElement('div');
    amPanel.id = 'appleMusicFabPanel';

    var amIframe = document.createElement('iframe');
    amIframe.setAttribute('allow', 'autoplay *; encrypted-media *; fullscreen *; clipboard-write');
    amIframe.setAttribute('frameborder', '0');
    amIframe.setAttribute('height', '175');
    amIframe.style.cssText = 'width:100%;max-width:500px;overflow:hidden;border-radius:10px;';
    amIframe.setAttribute('sandbox', 'allow-forms allow-popups allow-same-origin allow-scripts allow-storage-access-by-user-activation allow-top-navigation-by-user-activation');
    amIframe.src = track.Apple_Music_Link;
    amPanel.appendChild(amIframe);

    amFab.addEventListener('click', function () {
      amPanel.style.display = amPanel.style.display === 'flex' ? 'none' : 'flex';
    });

    document.body.appendChild(amPanel);
    document.body.appendChild(amFab);
  }

})();
</script>
