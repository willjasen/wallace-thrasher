---
layout: page
hide_from_nav: true
---

<div id="track-content">
  <p style="text-align: center;"><em>Loading track data...</em></p>
</div>

<style>
  .album-info {
    display: flex;
    align-items: center;
  }
  .image-container {
    margin-right: 20px;
  }
  .tooltip {
    position: relative;
    display: inline-block;
    cursor: pointer;
  }
  .tooltip .tooltiptext {
    visibility: hidden;
    opacity: 0;
    width: 200px;
    background-color: lavender;
    color: #000;
    text-align: center;
    border-radius: 4px;
    padding: 8px;
    position: absolute;
    z-index: 1;
    bottom: 125%;
    left: 50%;
    transform: translateX(-50%);
    transition: opacity 0.3s;
    border: 1px solid #ffdd57;
    box-shadow: 0 0 10px rgba(255, 221, 87, 0.5);
  }
  .tooltip:hover .tooltiptext {
    visibility: visible;
    opacity: 1;
  }

  #audioFab {
    position: fixed;
    bottom: 24px;
    right: 24px;
    z-index: 1000;
    height: 48px;
    min-width: 48px;
    border-radius: 24px;
    background: #5a5a9a;
    border: 2px solid #9a9adf;
    cursor: pointer;
    display: flex;
    flex-direction: row;
    align-items: center;
    justify-content: center;
    gap: 6px;
    padding: 0 14px;
    font-size: 22px;
    box-shadow: 0 4px 14px rgba(0,0,0,0.5);
    transition: background 0.2s, box-shadow 0.2s, min-width 0.2s;
    line-height: 1;
  }
  #audioFab:hover {
    background: #7a7abf;
    box-shadow: 0 6px 18px rgba(0,0,0,0.6);
  }
  #audioFabTime {
    font-size: 13px;
    font-weight: bold;
    color: #d0d0ff;
    letter-spacing: 0.04em;
    line-height: 1;
    display: none;
    white-space: nowrap;
  }
  #audioFabPanel {
    position: fixed;
    bottom: 90px;
    right: 24px;
    z-index: 999;
    background: #1e1e3a;
    border: 1px solid #7a7abf;
    border-radius: 14px;
    padding: 16px 18px;
    box-shadow: 0 8px 28px rgba(0,0,0,0.6);
    display: none;
    flex-direction: column;
    align-items: center;
    min-width: 300px;
    gap: 10px;
  }
  #audioFabPanel audio {
    width: 100%;
    margin-top: 4px;
  }
  #audioFabPanel .fab-panel-title {
    margin: 0;
    color: #b0b0e0;
    font-size: 0.78em;
    text-align: center;
  }
</style>

<script>
(async function () {
  const BASE_URL = '{{ site.baseurl }}';
  const JEKYLL_ENV = '{{ jekyll.environment }}';
  const BUILD_TIMESTAMP = '{{ site.time | date: "%s" }}';

  const params = new URLSearchParams(window.location.search);
  const albumSlug = params.get('album');
  const trackSlug = params.get('track');
  const container = document.getElementById('track-content');

  if (!albumSlug || !trackSlug) {
    container.innerHTML = '<p style="text-align: center;">No track specified. <a href="' + BASE_URL + '/albums/">Browse albums</a></p>';
    return;
  }

  async function fetchCached(path) {
    if (!('caches' in window)) {
      return fetch(path).then(r => r.json());
    }
    const cacheName = 'wallace-thrasher-' + BUILD_TIMESTAMP;
    const cache = await caches.open(cacheName);
    const cached = await cache.match(path);
    if (cached) { return cached.json(); }
    const response = await fetch(path);
    const data = await response.json();
    await cache.put(path, new Response(JSON.stringify(data), { headers: { 'Content-Type': 'application/json' } }));
    const keys = await caches.keys();
    for (const key of keys) {
      if (key !== cacheName && key.startsWith('wallace-thrasher-')) {
        await caches.delete(key);
      }
    }
    return data;
  }

  let data;
  try {
    data = await fetchCached(BASE_URL + '/assets/json/data.combined.json');
  } catch (e) {
    console.error('Error loading track data:', e);
    container.innerHTML = '<p style="text-align: center;">Error loading track data.</p>';
    return;
  }

  const album = (data.Albums || []).find(a => a.Album_Slug === albumSlug);
  if (!album) {
    container.innerHTML = '<p style="text-align: center;">Album not found: ' + albumSlug + '</p>';
    return;
  }

  const track = (album.Tracks || []).find(t => t.Track_Slug === trackSlug);
  if (!track) {
    container.innerHTML = '<p style="text-align: center;">Track not found: ' + trackSlug + '</p>';
    return;
  }

  document.title = track.Track_Title + ' \u2014 ' + album.Album;

  const needsReview = (track.Speakers_Adjusted !== true) || (track.Subtitles_Adjusted !== true);

  // Helper: create element with optional attributes and text content
  function el(tag, attrs) {
    const e = document.createElement(tag);
    Object.entries(attrs || {}).forEach(([k, v]) => e.setAttribute(k, v));
    return e;
  }
  function textEl(tag, attrs, content) {
    const e = el(tag, attrs);
    e.textContent = content;
    return e;
  }
  function hr(style) {
    const e = document.createElement('hr');
    e.style.margin = style || '20px 0';
    return e;
  }

  const frag = document.createDocumentFragment();

  // ---- Album header ----
  const albumInfo = el('div', { class: 'album-info', style: 'display: flex; align-items: center;' });
  albumInfo.appendChild(textEl('h2', { style: 'margin-bottom: 10px;' }, album.Album + ' (' + album.Year + ')'));
  const imgContainer = el('div', { class: 'image-container', style: 'margin-left: 50px;' });
  imgContainer.appendChild(el('img', { src: BASE_URL + '/assets/img/albums/' + album.Album_Picture, alt: album.Album, width: '150', height: '150' }));
  albumInfo.appendChild(imgContainer);
  frag.appendChild(albumInfo);

  // ---- Track title and number ----
  frag.appendChild(textEl('h3', { style: 'text-align: center; margin-top: 20px; margin-bottom: 0px;' },
    'Track ' + track.Track_Number + ': ' + track.Track_Title));

  // ---- Runtime ----
  if (track.Track_Length) {
    frag.appendChild(textEl('h4', { style: 'text-align: center; margin-top: 0px; margin-bottom: 0px;' },
      'Runtime: ' + track.Track_Length + ' seconds'));
  }

  // ---- Review status ----
  const reviewP = el('p', { style: 'text-align: center;' });
  if (needsReview) {
    reviewP.style.color = 'yellow';
    reviewP.innerHTML = 'This track needs reviewing! <a href="https://github.com/willjasen/wallace-thrasher/blob/main/CONTRIBUTING.md">--&gt; Lend a hand &lt;--</a>';
  } else {
    reviewP.style.color = 'green';
    reviewP.textContent = 'This track has been reviewed! \uD83D\uDE0A';
  }
  frag.appendChild(reviewP);

  // ---- Dev-environment metadata (non-production only) ----
  if (JEKYLL_ENV !== 'production') {
    frag.appendChild(hr());
    if (track.Last_Modified) {
      const d = new Date(track.Last_Modified * 1000);
      const iso = d.toISOString().replace(/\.\d{3}Z$/, '').replace('T', 'T');
      frag.appendChild(textEl('h5', { style: 'text-align: center; margin-top: -10px; margin-bottom: 30px;' }, 'Last modified: ' + iso));
    }
    if (track.Whisper_Model) {
      frag.appendChild(textEl('h5', { style: 'text-align: center; margin-top: -30px; margin-bottom: 30px;' }, 'Model used: ' + track.Whisper_Model));
    }
    frag.appendChild(textEl('h5', { style: 'text-align: center; margin-top: -30px; margin-bottom: 30px;' },
      'Speakers adjusted? ' + (track.Speakers_Adjusted !== undefined ? track.Speakers_Adjusted : false)));
    frag.appendChild(textEl('h5', { style: 'text-align: center; margin-top: -30px; margin-bottom: 30px;' },
      'Subtitles adjusted? ' + (track.Subtitles_Adjusted !== undefined ? track.Subtitles_Adjusted : false)));
    if (track.To_Do) {
      frag.appendChild(textEl('h5', { style: 'text-align: center; margin-top: -30px; margin-bottom: 40px;' }, 'To-Do: ' + track.To_Do));
    }
  }

  // ---- Apple Music embed ----
  if (track.Apple_Music_Link) {
    const amH5 = el('h5', { style: 'text-align: center; margin-top: 0px; margin-bottom: 40px;' });
    amH5.appendChild(el('iframe', {
      allow: 'autoplay *; encrypted-media *; fullscreen *; clipboard-write',
      frameborder: '0',
      height: '175',
      style: 'width:100%;max-width:500px;overflow:hidden;border-radius:10px;',
      sandbox: 'allow-forms allow-popups allow-same-origin allow-scripts allow-storage-access-by-user-activation allow-top-navigation-by-user-activation',
      src: track.Apple_Music_Link
    }));
    frag.appendChild(amH5);
  }

  frag.appendChild(hr());

  // ---- Aliases / Establishments / Deliveries ----
  if (track.Aliases && track.Aliases.length > 0) {
    frag.appendChild(textEl('h5', { style: 'text-align: center; margin-top: 0px; margin-bottom: 0px;' },
      'Aliases: ' + track.Aliases.join(', ')));
  }
  if (track.Establishments && track.Establishments.length > 0) {
    frag.appendChild(textEl('h5', { style: 'text-align: center; margin-top: 0px; margin-bottom: 0px;' },
      'Establishments: ' + track.Establishments.join(', ')));
  }
  if (track.Deliveries && track.Deliveries.length > 0) {
    frag.appendChild(textEl('h5', { style: 'text-align: center; margin-top: 0px; margin-bottom: 0px;' },
      'Deliveries: ' + track.Deliveries.join(', ')));
  }

  // ---- Audio player (floating FAB) ----
  const isMobile = window.innerWidth <= 768 ||
    /Android|webOS|iPhone|iPad|iPod|BlackBerry|Windows Phone/i.test(navigator.userAgent);

  if (!isMobile) {
    const fab = el('button', { id: 'audioFab', title: 'Listen to track', 'aria-label': 'Listen to track' });
    fab.textContent = '\uD83C\uDFA7';
    const fabTimeLabel = el('span', { id: 'audioFabTime' });
    fab.appendChild(fabTimeLabel);

    const fabPanel = el('div', { id: 'audioFabPanel' });

    const panelTitle = el('p', { class: 'fab-panel-title' });
    panelTitle.textContent = 'Select the top-level directory for the collection, usually named \u201CLPC USB\u201D';
    fabPanel.appendChild(panelTitle);

    const audioPlayer = el('audio', { id: 'audioPlayer', controls: '' });
    audioPlayer.style.display = 'none';
    fabPanel.appendChild(audioPlayer);

    // Close panel when clicking outside
    document.addEventListener('click', function (e) {
      if (!fab.contains(e.target) && !fabPanel.contains(e.target)) {
        fabPanel.style.display = 'none';
      }
    });

    if ('showDirectoryPicker' in window) {
      // --- File System Access API: persists handle across page navigations via IndexedDB ---
      function openDb() {
        return new Promise(function (resolve, reject) {
          const req = indexedDB.open('lpc-usb-db', 1);
          req.onupgradeneeded = function (e) { e.target.result.createObjectStore('handles'); };
          req.onsuccess = function (e) { resolve(e.target.result); };
          req.onerror = function () { reject(req.error); };
        });
      }
      async function getStoredHandle() {
        try {
          const db = await openDb();
          return await new Promise(function (resolve) {
            const tx = db.transaction('handles', 'readonly');
            const get = tx.objectStore('handles').get('lpcUsb');
            get.onsuccess = function () { resolve(get.result || null); };
            get.onerror = function () { resolve(null); };
          });
        } catch (e) { return null; }
      }
      async function storeHandle(handle) {
        const db = await openDb();
        return new Promise(function (resolve, reject) {
          const tx = db.transaction('handles', 'readwrite');
          tx.objectStore('handles').put(handle, 'lpcUsb');
          tx.oncomplete = function () { resolve(); };
          tx.onerror = function () { reject(tx.error); };
        });
      }

      // Pre-load handle into memory so FAB click can use it without any prior awaits
      let cachedHandle = null;
      getStoredHandle().then(function (h) { cachedHandle = h; });

      async function loadTrackFromDir(dirHandle) {
        try {
          const albumDir = await dirHandle.getDirectoryHandle(album.USB_Directory);
          const usbFilename = track.USB_Filename || (track.Track_Title + '.mp3');
          const fileHandle = await albumDir.getFileHandle(usbFilename);
          const file = await fileHandle.getFile();
          audioPlayer.src = URL.createObjectURL(file);
          audioPlayer.style.display = '';
          selectBtn.textContent = '\u2705 LPC USB loaded';
          selectBtn.style.borderColor = 'greenyellow';
          panelTitle.style.display = 'none';
          audioPlayer.addEventListener('timeupdate', function () {
            if (audioPlayer.duration) {
              const s = Math.floor(audioPlayer.currentTime);
              fabTimeLabel.textContent = Math.floor(s / 60) + ':' + String(s % 60).padStart(2, '0');
              fabTimeLabel.style.display = 'block';
            }
          });
        } catch (e) {
          console.warn('Could not load track from directory:', e);
        }
      }

      const selectBtn = el('button', { id: 'selectLpcBtn', style: 'color: greenyellow; background: none; border: 1px solid greenyellow; border-radius: 6px; padding: 6px 12px; cursor: pointer; font-weight: bold;' });
      selectBtn.textContent = '\u2B07\uFE0F Select LPC USB \u2B07\uFE0F';
      fabPanel.insertBefore(selectBtn, audioPlayer);

      selectBtn.addEventListener('click', async function () {
        try {
          const dirHandle = await window.showDirectoryPicker({ mode: 'read', startIn: 'music' });
          await storeHandle(dirHandle);
          cachedHandle = dirHandle;
          await loadTrackFromDir(dirHandle);
        } catch (e) {
          if (e.name !== 'AbortError') console.error(e);
        }
      });

      // FAB click is a user gesture. With cachedHandle already in memory (no await needed),
      // requestPermission fires immediately within the activation window — this is what
      // allows the browser to re-grant permission across page navigations without re-picking.
      fab.addEventListener('click', async function () {
        const isOpen = fabPanel.style.display === 'flex';
        fabPanel.style.display = isOpen ? 'none' : 'flex';
        if (!isOpen && audioPlayer.style.display === 'none' && cachedHandle) {
          try {
            const perm = await cachedHandle.requestPermission({ mode: 'read' });
            if (perm === 'granted') {
              await loadTrackFromDir(cachedHandle);
            }
          } catch (e) {
            console.warn('Could not auto-load from stored handle:', e);
          }
        }
      });

    } else {
      // --- Fallback: legacy <input webkitdirectory> for browsers without File System Access API ---
      const fileLabel = el('label', { for: 'fileInput', class: 'tooltip', style: 'color: greenyellow; cursor: pointer; font-weight: bold;' });
      fileLabel.textContent = '\u2B07\uFE0F Select LPC USB \u2B07\uFE0F';
      const tooltipSpan = el('span', { class: 'tooltiptext' });
      tooltipSpan.textContent = 'Select the top-level directory for the collection, usually named "LPC USB"';
      fileLabel.appendChild(tooltipSpan);
      fabPanel.insertBefore(fileLabel, audioPlayer);

      const fileInput = el('input', { type: 'file', id: 'fileInput', accept: 'audio/mp3', webkitdirectory: '', multiple: '' });
      fabPanel.insertBefore(fileInput, audioPlayer);

      fab.addEventListener('click', function () {
        const isOpen = fabPanel.style.display === 'flex';
        fabPanel.style.display = isOpen ? 'none' : 'flex';
      });

      const fileMap = {};
      fileInput.addEventListener('change', function (event) {
        const files = event.target.files;
        for (const file of files) {
          fileMap[file.webkitRelativePath] = URL.createObjectURL(file);
        }
        const usbFilename = track.USB_Filename || (track.Track_Title + '.mp3');
        const relevantUrl = 'LPC USB/' + album.USB_Directory + '/' + usbFilename;
        console.log('Relevant URL: ' + relevantUrl);
        const matchingUrl = fileMap[relevantUrl];
        console.log('Matching URL: ' + matchingUrl);
        if (matchingUrl) {
          audioPlayer.src = matchingUrl;
          audioPlayer.style.display = '';
        } else {
          console.warn('Audio file not found in selected directory: ' + relevantUrl);
        }
      });
    }

    document.body.appendChild(fabPanel);
    document.body.appendChild(fab);
  }

  // ---- Subtitles ----
  frag.appendChild(hr());

  const subtitlesList = el('ul', { style: 'list-style-type: none;' });
  const subtitles = track.Subtitles || [];
  subtitles.forEach(function (sub) {
    const li = document.createElement('li');
    if (JEKYLL_ENV !== 'production') {
      const idxEl = document.createElement('i');
      idxEl.textContent = sub.Index;
      li.appendChild(idxEl);
      li.appendChild(document.createTextNode(' -- '));
    }
    const strong = document.createElement('strong');
    strong.textContent = sub.Speaker + ':';
    li.appendChild(strong);
    li.appendChild(document.createTextNode(' ' + sub.Text));
    li.appendChild(document.createElement('br'));
    subtitlesList.appendChild(li);
  });
  frag.appendChild(subtitlesList);

  // Replace loading indicator with rendered content
  container.innerHTML = '';
  container.appendChild(frag);

})();
</script>
