---
layout: page
hide_from_nav: true
---

<div id="track-content">
  <p style="text-align: center;"><em>Loading track data...</em></p>
</div>

<style>
  .album-info {
    display: flex;
    align-items: center;
  }
  .image-container {
    margin-right: 20px;
  }
  .tooltip {
    position: relative;
    display: inline-block;
    cursor: pointer;
  }
  .tooltip .tooltiptext {
    visibility: hidden;
    opacity: 0;
    width: 200px;
    background-color: lavender;
    color: #000;
    text-align: center;
    border-radius: 4px;
    padding: 8px;
    position: absolute;
    z-index: 1;
    bottom: 125%;
    left: 50%;
    transform: translateX(-50%);
    transition: opacity 0.3s;
    border: 1px solid #ffdd57;
    box-shadow: 0 0 10px rgba(255, 221, 87, 0.5);
  }
  .tooltip:hover .tooltiptext {
    visibility: visible;
    opacity: 1;
  }
  .subtitle-line {
    padding: 4px 10px;
    border-left: 3px solid transparent;
    border-radius: 3px;
    transition: background-color 0.25s, border-color 0.25s;
  }
  .subtitle-line.subtitle-active {
    background-color: rgba(173, 255, 47, 0.15);
    border-left-color: greenyellow;
  }
</style>

<script>
(async function () {
  const BASE_URL = '{{ site.baseurl }}';
  const JEKYLL_ENV = '{{ jekyll.environment }}';
  const BUILD_TIMESTAMP = '{{ site.time | date: "%s" }}';

  const params = new URLSearchParams(window.location.search);
  const albumSlug = params.get('album');
  const trackSlug = params.get('track');
  const container = document.getElementById('track-content');

  if (!albumSlug || !trackSlug) {
    container.innerHTML = '<p style="text-align: center;">No track specified. <a href="' + BASE_URL + '/albums/">Browse albums</a></p>';
    return;
  }

  async function fetchCached(path) {
    if (!('caches' in window)) {
      return fetch(path).then(r => r.json());
    }
    const cacheName = 'wallace-thrasher-' + BUILD_TIMESTAMP;
    const cache = await caches.open(cacheName);
    const cached = await cache.match(path);
    if (cached) { return cached.json(); }
    const response = await fetch(path);
    const data = await response.json();
    await cache.put(path, new Response(JSON.stringify(data), { headers: { 'Content-Type': 'application/json' } }));
    const keys = await caches.keys();
    for (const key of keys) {
      if (key !== cacheName && key.startsWith('wallace-thrasher-')) {
        await caches.delete(key);
      }
    }
    return data;
  }

  let data;
  try {
    data = await fetchCached(BASE_URL + '/assets/json/data.combined.json');
  } catch (e) {
    console.error('Error loading track data:', e);
    container.innerHTML = '<p style="text-align: center;">Error loading track data.</p>';
    return;
  }

  const album = (data.Albums || []).find(a => a.Album_Slug === albumSlug);
  if (!album) {
    container.innerHTML = '<p style="text-align: center;">Album not found: ' + albumSlug + '</p>';
    return;
  }

  const track = (album.Tracks || []).find(t => t.Track_Slug === trackSlug);
  if (!track) {
    container.innerHTML = '<p style="text-align: center;">Track not found: ' + trackSlug + '</p>';
    return;
  }

  document.title = track.Track_Title + ' \u2014 ' + album.Album;

  const needsReview = (track.Speakers_Adjusted !== true) || (track.Subtitles_Adjusted !== true);

  // Helper: create element with optional attributes and text content
  function el(tag, attrs) {
    const e = document.createElement(tag);
    Object.entries(attrs || {}).forEach(([k, v]) => e.setAttribute(k, v));
    return e;
  }
  function textEl(tag, attrs, content) {
    const e = el(tag, attrs);
    e.textContent = content;
    return e;
  }
  function hr(style) {
    const e = document.createElement('hr');
    e.style.margin = style || '20px 0';
    return e;
  }

  const frag = document.createDocumentFragment();

  // ---- Album header ----
  const albumInfo = el('div', { class: 'album-info', style: 'display: flex; align-items: center;' });
  albumInfo.appendChild(textEl('h2', { style: 'margin-bottom: 10px;' }, album.Album + ' (' + album.Year + ')'));
  const imgContainer = el('div', { class: 'image-container', style: 'margin-left: 50px;' });
  imgContainer.appendChild(el('img', { src: BASE_URL + '/assets/img/albums/' + album.Album_Picture, alt: album.Album, width: '150', height: '150' }));
  albumInfo.appendChild(imgContainer);
  frag.appendChild(albumInfo);

  // ---- Track title and number ----
  frag.appendChild(textEl('h3', { style: 'text-align: center; margin-top: 20px; margin-bottom: 0px;' },
    'Track ' + track.Track_Number + ': ' + track.Track_Title));

  // ---- Runtime ----
  if (track.Track_Length) {
    frag.appendChild(textEl('h4', { style: 'text-align: center; margin-top: 0px; margin-bottom: 0px;' },
      'Runtime: ' + track.Track_Length + ' seconds'));
  }

  // ---- Review status ----
  const reviewP = el('p', { style: 'text-align: center;' });
  if (needsReview) {
    reviewP.style.color = 'yellow';
    reviewP.innerHTML = 'This track needs reviewing! <a href="https://github.com/willjasen/wallace-thrasher/blob/main/CONTRIBUTING.md">--&gt; Lend a hand &lt;--</a>';
  } else {
    reviewP.style.color = 'green';
    reviewP.textContent = 'This track has been reviewed! \uD83D\uDE0A';
  }
  frag.appendChild(reviewP);

  // ---- Dev-environment metadata (non-production only) ----
  if (JEKYLL_ENV !== 'production') {
    frag.appendChild(hr());
    if (track.Last_Modified) {
      const d = new Date(track.Last_Modified * 1000);
      const iso = d.toISOString().replace(/\.\d{3}Z$/, '').replace('T', 'T');
      frag.appendChild(textEl('h5', { style: 'text-align: center; margin-top: -10px; margin-bottom: 30px;' }, 'Last modified: ' + iso));
    }
    if (track.Whisper_Model) {
      frag.appendChild(textEl('h5', { style: 'text-align: center; margin-top: -30px; margin-bottom: 30px;' }, 'Model used: ' + track.Whisper_Model));
    }
    frag.appendChild(textEl('h5', { style: 'text-align: center; margin-top: -30px; margin-bottom: 30px;' },
      'Speakers adjusted? ' + (track.Speakers_Adjusted !== undefined ? track.Speakers_Adjusted : false)));
    frag.appendChild(textEl('h5', { style: 'text-align: center; margin-top: -30px; margin-bottom: 30px;' },
      'Subtitles adjusted? ' + (track.Subtitles_Adjusted !== undefined ? track.Subtitles_Adjusted : false)));
    if (track.To_Do) {
      frag.appendChild(textEl('h5', { style: 'text-align: center; margin-top: -30px; margin-bottom: 40px;' }, 'To-Do: ' + track.To_Do));
    }
  }

  frag.appendChild(hr());

  // ---- Aliases / Establishments / Deliveries ----
  if (track.Aliases && track.Aliases.length > 0) {
    frag.appendChild(textEl('h5', { style: 'text-align: center; margin-top: 0px; margin-bottom: 0px;' },
      'Aliases: ' + track.Aliases.join(', ')));
  }
  if (track.Establishments && track.Establishments.length > 0) {
    frag.appendChild(textEl('h5', { style: 'text-align: center; margin-top: 0px; margin-bottom: 0px;' },
      'Establishments: ' + track.Establishments.join(', ')));
  }
  if (track.Deliveries && track.Deliveries.length > 0) {
    frag.appendChild(textEl('h5', { style: 'text-align: center; margin-top: 0px; margin-bottom: 0px;' },
      'Deliveries: ' + track.Deliveries.join(', ')));
  }

  // ---- Audio player (delegates to persistent-player.js) ----
  // Container in the page for a "Play this track" button when audio is already playing
  const audioContainer = el('div', { style: 'text-align: center; margin: 10px 0;' });
  frag.appendChild(audioContainer);

  // Karaoke is only started when THIS page's track is actually loaded into the player.
  // startKaraokeCallback is set after the DOM is rendered (subtitle elements exist).
  // thisTrackShouldHighlight is set when the audio auto-loads before the DOM is ready.
  let thisTrackShouldHighlight = false;
  let startKaraokeCallback = null;

  function applyTrackAudio(matchingUrl) {
    const audio = window.lpcPlayer.audio;
    if (!audio.paused) {
      // Something is actively playing — don't interrupt; offer a button to switch
      audioContainer.innerHTML = '';
      const btn = document.createElement('button');
      btn.textContent = '\u25B6 Play this track';
      btn.style.cssText = 'color: greenyellow; background: none; border: 1px solid greenyellow; border-radius: 6px; padding: 6px 14px; cursor: pointer; font-weight: bold; font-size: 1em;';
      btn.addEventListener('click', function () {
        audio.src = matchingUrl;
        audio.style.display = '';
        audio.play();
        btn.remove();
        if (startKaraokeCallback) startKaraokeCallback();
      });
      audioContainer.appendChild(btn);
    } else {
      // Nothing playing — auto-load this track
      audio.src = matchingUrl;
      audio.style.display = '';
      // If the DOM is already rendered, start karaoke now; otherwise flag it for after render.
      if (startKaraokeCallback) {
        startKaraokeCallback();
      } else {
        thisTrackShouldHighlight = true;
      }
    }
  }

  function initTrackAudio() {
    const usbFilename = track.USB_Filename || (track.Track_Title + '.mp3');
    const albumUsbDir = album.USB_Directory;
    const relevantUrl = 'LPC USB/' + albumUsbDir + '/' + usbFilename;

    if (window.lpcPlayer && window.lpcPlayer.isLoaded()) {
      const matchingUrl = window.fileMap[relevantUrl];
      if (matchingUrl) {
        applyTrackAudio(matchingUrl);
        window.lpcPlayer.setNowPlaying(album.Album, track.Track_Title);
      }
    }
    // Load when directory is selected/granted for the first time
    document.addEventListener('lpc-loaded', function () {
      const matchingUrl = window.fileMap[relevantUrl];
      if (matchingUrl) {
        applyTrackAudio(matchingUrl);
        window.lpcPlayer.setNowPlaying(album.Album, track.Track_Title);
      }
    }, { once: true });
    document.addEventListener('lpc-permission-granted', async function () {
      const ok = await window.lpcPlayer.loadTrack(albumUsbDir, usbFilename);
      if (ok) {
        window.lpcPlayer.setNowPlaying(album.Album, track.Track_Title);
        if (startKaraokeCallback) startKaraokeCallback();
      }
    }, { once: true });
  }
  initTrackAudio();

  // ---- Subtitles ----
  frag.appendChild(hr());

  // "Suggest edits" toggle button — lets visitors edit speakers/subtitles inline
  const editToggleBtn = el('button', {
    id: 'suggest-edit-toggle',
    style: 'display:block;margin:0 auto 12px;background:none;border:1px solid lavender;color:lavender;border-radius:6px;padding:5px 14px;cursor:pointer;font-size:0.85em;',
  });
  editToggleBtn.textContent = '\u270F\uFE0F Suggest edits';
  frag.appendChild(editToggleBtn);

  const subtitlesList = el('ul', { id: 'subtitleList', style: 'list-style-type: none; padding-left: 0; padding-bottom: 60px;' });
  const subtitles = track.Subtitles || [];
  subtitles.forEach(function (sub) {
    const li = document.createElement('li');
    li.className = 'subtitle-line';
    li.setAttribute('data-sub-index', sub.Index);
    if (sub['Start Time']) li.setAttribute('data-start', sub['Start Time']);
    if (sub['End Time'])   li.setAttribute('data-end',   sub['End Time']);

    // ---- View span (default display) ----
    const viewSpan = el('span', { class: 'sub-view' });
    if (JEKYLL_ENV !== 'production') {
      const idxEl = document.createElement('i');
      idxEl.textContent = sub.Index;
      viewSpan.appendChild(idxEl);
      viewSpan.appendChild(document.createTextNode(' -- '));
    }
    const strong = document.createElement('strong');
    strong.textContent = sub.Speaker + ':';
    viewSpan.appendChild(strong);
    viewSpan.appendChild(document.createTextNode(' ' + sub.Text));
    li.appendChild(viewSpan);

    // ---- Edit span (shown only in edit mode) ----
    const editSpan = el('span', { class: 'sub-edit', style: 'display:none;align-items:baseline;gap:6px;' });
    const speakerInput = el('input', {
      class: 'sub-speaker-input',
      type: 'text',
      value: sub.Speaker,
      'data-orig': sub.Speaker,
      'aria-label': 'Speaker',
      style: 'width:110px;font-size:0.85em;padding:2px 6px;border-radius:4px;border:1px solid #666;background:#1a1a2e;color:#e0e0e0;',
    });
    editSpan.appendChild(speakerInput);
    editSpan.appendChild(document.createTextNode(': '));
    const textInput = el('input', {
      class: 'sub-text-input',
      type: 'text',
      value: sub.Text,
      'data-orig': sub.Text,
      'aria-label': 'Subtitle text',
      style: 'width:calc(100% - 160px);min-width:180px;font-size:0.85em;padding:2px 6px;border-radius:4px;border:1px solid #666;background:#1a1a2e;color:#e0e0e0;',
    });
    editSpan.appendChild(textInput);
    li.appendChild(editSpan);

    li.appendChild(document.createElement('br'));
    subtitlesList.appendChild(li);
  });
  frag.appendChild(subtitlesList);

  // Replace loading indicator with rendered content
  container.innerHTML = '';
  container.appendChild(frag);

  // ---- Edit mode wiring ----
  (function () {
    let editMode = false;

    // Sticky submit bar — z-index 7000 keeps it below the audio/Apple Music FABs (9000)
    const bar = el('div', {
      id: 'suggest-edit-bar',
      style: 'display:none;position:fixed;bottom:0;left:0;right:0;z-index:7000;background:#1a1a2e;border-top:1px solid lavender;padding:10px 20px;flex-direction:column;align-items:center;gap:8px;',
    });
    const barTop = el('div', { style: 'display:flex;align-items:center;gap:10px;flex-wrap:wrap;justify-content:center;width:100%;' });

    const changeCountEl = el('span', { style: 'color:lavender;font-size:0.85em;white-space:nowrap;' });
    changeCountEl.textContent = '0 changes';

    const noteInput = el('input', {
      type: 'text',
      placeholder: 'Optional note for reviewer\u2026',
      maxlength: '500',
      style: 'flex:1;min-width:160px;max-width:380px;font-size:0.85em;padding:4px 8px;border-radius:4px;border:1px solid #666;background:#0d0d1a;color:#e0e0e0;',
    });

    const submitBtn = el('button', {
      style: 'background:none;border:1px solid greenyellow;color:greenyellow;border-radius:6px;padding:5px 16px;cursor:pointer;font-size:0.85em;font-weight:bold;',
    });
    submitBtn.textContent = 'Submit suggestions';
    submitBtn.disabled = true;

    const cancelBtn = el('button', {
      style: 'background:none;border:1px solid #666;color:#aaa;border-radius:6px;padding:5px 14px;cursor:pointer;font-size:0.85em;',
    });
    cancelBtn.textContent = 'Cancel';

    const resultEl = el('div', { style: 'font-size:0.85em;text-align:center;' });

    barTop.appendChild(changeCountEl);
    barTop.appendChild(noteInput);
    barTop.appendChild(submitBtn);
    barTop.appendChild(cancelBtn);
    bar.appendChild(barTop);
    bar.appendChild(resultEl);
    document.body.appendChild(bar);

    function getEdits() {
      const edits = [];
      document.querySelectorAll('#subtitleList .subtitle-line[data-sub-index]').forEach(function (li) {
        const idx    = parseInt(li.dataset.subIndex, 10);
        const sIn    = li.querySelector('.sub-speaker-input');
        const tIn    = li.querySelector('.sub-text-input');
        const speakerChanged = sIn && sIn.value !== sIn.dataset.orig;
        const textChanged    = tIn && tIn.value !== tIn.dataset.orig;
        if (speakerChanged || textChanged) {
          const edit = { index: idx };
          if (speakerChanged) edit.speaker = sIn.value;
          if (textChanged)    edit.text    = tIn.value;
          edits.push(edit);
        }
      });
      return edits;
    }

    function updateCount() {
      const edits = getEdits();
      changeCountEl.textContent = edits.length + ' change' + (edits.length !== 1 ? 's' : '');
      submitBtn.disabled = edits.length === 0;
    }

    function enterEditMode() {
      editMode = true;
      editToggleBtn.textContent = '\u2715 Exit edit mode';
      editToggleBtn.style.borderColor = '#666';
      editToggleBtn.style.color = '#aaa';
      document.querySelectorAll('#subtitleList .sub-view').forEach(function (v) { v.style.display = 'none'; });
      document.querySelectorAll('#subtitleList .sub-edit').forEach(function (e) { e.style.display = 'inline-flex'; });
      bar.style.display = 'flex';
      resultEl.textContent = '';
      updateCount();
      document.querySelectorAll('#subtitleList .sub-speaker-input, #subtitleList .sub-text-input').forEach(function (inp) {
        inp.addEventListener('input', updateCount);
      });
    }

    function exitEditMode() {
      editMode = false;
      editToggleBtn.textContent = '\u270F\uFE0F Suggest edits';
      editToggleBtn.style.borderColor = 'lavender';
      editToggleBtn.style.color = 'lavender';
      document.querySelectorAll('#subtitleList .sub-view').forEach(function (v) { v.style.display = ''; });
      document.querySelectorAll('#subtitleList .sub-edit').forEach(function (e) { e.style.display = 'none'; });
      bar.style.display = 'none';
    }

    editToggleBtn.addEventListener('click', function () {
      if (editMode) { exitEditMode(); } else { enterEditMode(); }
    });

    cancelBtn.addEventListener('click', exitEditMode);

    // Clean up bar when the user soft-navigates to another track
    document.addEventListener('soft-nav', function () {
      const b = document.getElementById('suggest-edit-bar');
      if (b) b.remove();
    }, { once: true });

    submitBtn.addEventListener('click', async function () {
      const edits = getEdits();
      if (edits.length === 0) return;
      submitBtn.disabled = true;
      submitBtn.textContent = 'Submitting\u2026';
      resultEl.textContent = '';
      resultEl.style.color = 'lavender';
      const note = noteInput.value.trim();
      try {
        const res = await fetch('/.netlify/functions/suggest-edit', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            edit_type: 'TrackLine',
            album_slug: albumSlug,
            track_slug: trackSlug,
            edits: edits,
            note: note || undefined,
            _hp: '',
          }),
        });
        const data = await res.json();
        if (data.ok) {
          resultEl.style.color = 'greenyellow';
          resultEl.innerHTML = 'Thank you! Suggestion submitted: <a href="' + data.pr_url + '" target="_blank" rel="noopener noreferrer" style="color:greenyellow;">PR #' + data.pr_number + '</a>';
          exitEditMode();
          editToggleBtn.style.display = 'none';
          bar.style.display = 'flex';
        } else {
          resultEl.style.color = '#ff6b6b';
          resultEl.textContent = 'Error: ' + (data.error || 'Unknown error');
        }
      } catch (err) {
        resultEl.style.color = '#ff6b6b';
        resultEl.textContent = 'Network error. Please try again.';
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = 'Submit suggestions';
        bar.style.display = 'flex';
      }
    });
  })();

  // ---- Karaoke highlight ----
  // Build subtitle timing data from the now-rendered DOM, then expose startKaraokeCallback
  // so that applyTrackAudio (and the button click handler) can activate highlighting only
  // when THIS page's track is actually loaded — not just because audio happens to be playing.
  (function () {
    function parseTimecode(tc) {
      if (!tc) return null;
      var parts = tc.split(',');
      var ms = parts.length > 1 ? parseInt(parts[1], 10) : 0;
      var timeParts = parts[0].split(':').map(Number);
      return timeParts[0] * 3600 + timeParts[1] * 60 + timeParts[2] + ms / 1000;
    }

    var items = Array.from(document.querySelectorAll('#subtitleList .subtitle-line'));
    var subtitleData = items
      .map(function (item) {
        return {
          el: item,
          start: parseTimecode(item.getAttribute('data-start')),
          end:   parseTimecode(item.getAttribute('data-end'))
        };
      })
      .filter(function (s) { return s.start !== null && s.end !== null; });

    var currentActive = null;
    var karaokeAbort = new AbortController();

    document.addEventListener('soft-nav', function () {
      karaokeAbort.abort();
      if (currentActive) { currentActive.el.classList.remove('subtitle-active'); currentActive = null; }
    }, { once: true });

    function updateHighlight(currentTime) {
      var next = null;
      for (var i = 0; i < subtitleData.length; i++) {
        if (currentTime >= subtitleData[i].start && currentTime <= subtitleData[i].end) {
          next = subtitleData[i];
          break;
        }
      }
      if (next === currentActive) return;
      if (currentActive) currentActive.el.classList.remove('subtitle-active');
      currentActive = next;
      if (currentActive) {
        currentActive.el.classList.add('subtitle-active');
        currentActive.el.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
      }
    }

    var karaokeStarted = false;
    // Assign to the outer-scope variable so applyTrackAudio's handlers can call it.
    startKaraokeCallback = function () {
      if (karaokeStarted || !subtitleData.length || !window.lpcPlayer) return;
      karaokeStarted = true;
      var audio = window.lpcPlayer.audio;
      audio.addEventListener('timeupdate', function () { updateHighlight(audio.currentTime); }, { signal: karaokeAbort.signal });
      audio.addEventListener('seeked',     function () { updateHighlight(audio.currentTime); }, { signal: karaokeAbort.signal });
      updateHighlight(audio.currentTime);
    };

    // If applyTrackAudio already auto-loaded this track before the DOM was ready, start now.
    if (thisTrackShouldHighlight) startKaraokeCallback();
  })();

  // ---- Apple Music FAB ----
  // Clean up any FAB left from a previous track navigation
  ['appleMusicFab', 'appleMusicFabPanel'].forEach(function (id) {
    var existing = document.getElementById(id);
    if (existing) existing.remove();
  });

  if (track.Apple_Music_Link) {
    if (!document.getElementById('appleMusicFabStyle')) {
      var amStyle = document.createElement('style');
      amStyle.id = 'appleMusicFabStyle';
      amStyle.textContent = [
        '#appleMusicFab {',
        '  position: fixed; bottom: 24px; left: 24px; z-index: 9000;',
        '  height: 60px; min-width: 60px; border-radius: 30px;',
        '  background: #fc3c44; border: 2px solid #ff6b6b;',
        '  cursor: pointer; display: flex; flex-direction: row; align-items: center;',
        '  justify-content: center; gap: 8px; padding: 0 18px;',
        '  font-size: 28px; box-shadow: 0 4px 14px rgba(0,0,0,0.5);',
        '  transition: background 0.2s, box-shadow 0.2s; line-height: 1;',
        '}',
        '#appleMusicFab:hover { background: #ff5a5a; box-shadow: 0 6px 18px rgba(0,0,0,0.6); }',
        '#appleMusicFabPanel {',
        '  position: fixed; bottom: 102px; left: 24px; z-index: 8999;',
        '  background: #1e1e3a; border: 1px solid #ff6b6b;',
        '  border-radius: 14px; padding: 16px 18px;',
        '  box-shadow: 0 8px 28px rgba(0,0,0,0.6);',
        '  display: none; flex-direction: column; align-items: center;',
        '  min-width: 320px; gap: 10px;',
        '}'
      ].join('\n');
      document.head.appendChild(amStyle);
    }

    var amFab = document.createElement('button');
    amFab.id = 'appleMusicFab';
    amFab.title = 'Listen on Apple Music';
    amFab.setAttribute('aria-label', 'Listen on Apple Music');
