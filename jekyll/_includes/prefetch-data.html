<script>
  (function() {
    var BASE_URL = '{{ site.baseurl }}';

    function isScriptLoaded(partialSrc) {
      return Array.from(document.scripts).some(function(s) {
        return s.src && s.src.indexOf(partialSrc) !== -1;
      });
    }

    function loadScript(src, integrity, onload) {
      var s = document.createElement('script');
      s.src = src;
      if (integrity) {
        s.integrity = integrity;
        s.crossOrigin = 'anonymous';
      }
      if (onload) s.onload = onload;
      document.head.appendChild(s);
    }

    function run() {
      // window._wtIsSearchPage is set synchronously by header.html on search pages,
      // before this idle callback is ever scheduled — so this check is race-condition-free.
      if (window._wtIsSearchPage) return;

      var lunrSrc    = BASE_URL + '/assets/js/lunr.js';
      var searchSrc  = BASE_URL + '/assets/js/search.js';
      var lunrIntegrity = 'sha256-icIor2ifjq4/O1GRu/ZJ8Pm2S4BClvYURbR3fneCLPs=';

      function injectSearch() {
        if (!isScriptLoaded('/assets/js/search.js')) {
          loadScript(searchSrc, null, null);
        }
      }

      if (isScriptLoaded('/assets/js/lunr.js')) {
        injectSearch();
      } else {
        loadScript(lunrSrc, lunrIntegrity, injectSearch);
      }
    }

    // Defer until idle so prefetching doesn't compete with current-page resources
    if (typeof requestIdleCallback === 'function') {
      requestIdleCallback(run);
    } else {
      setTimeout(run, 0);
    }
  })();
</script>
